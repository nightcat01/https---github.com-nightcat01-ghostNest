<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostNest Crop Tool</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="asset-lab-shell">
      <header class="asset-lab-header">
        <div>
          <p class="eyebrow">Helper / Character Settings</p>
          <h1>Crop</h1>
        </div>
        <a class="asset-lab-back" href="./dev-character.html">제작 홈</a>
      </header>

      <nav class="asset-tool-nav" aria-label="Character setting pages" data-character-nav data-current-page="crop"></nav>

      <section class="asset-lab-grid" aria-label="Crop tool">
        <section class="asset-lab-panel">
          <div class="asset-lab-section asset-step-intro">
            <h2>이 도구를 쓰는 때</h2>
            <p class="asset-lab-help">base 이미지에서 눈, 입 같은 파츠를 만들 영역을 잡을 때 사용합니다. 영역 값은 파츠 / 애니메이션 단계의 위치 기준으로도 이어집니다.</p>
          </div>

          <div class="asset-lab-section">
            <h2>이미지와 영역</h2>
            <label>
              파츠 종류
              <select id="partRecipeSelect" name="partRecipe">
                <option value="eyeBlink">눈 깜빡임</option>
                <option value="mouthShapes">입모양</option>
                <option value="expressionSet">표정 파츠</option>
              </select>
            </label>
            <label>
              기준 이미지
              <input id="baseImageInput" type="file" accept="image/*" />
            </label>
            <div class="asset-lab-region-grid">
              <label>X <input id="targetRegionXInput" type="number" min="0" max="100" step="1" /></label>
              <label>Y <input id="targetRegionYInput" type="number" min="0" max="100" step="1" /></label>
              <label>W <input id="targetRegionWidthInput" type="number" min="1" max="100" step="1" /></label>
              <label>H <input id="targetRegionHeightInput" type="number" min="1" max="100" step="1" /></label>
            </div>
            <label class="asset-lab-checkbox asset-inline-checkbox">
              <input id="regionOverlayVisibleInput" type="checkbox" checked />
              <span>영역 테두리 표시</span>
            </label>
            <div class="asset-lab-actions">
              <button type="button" id="downloadCropButton">Crop 다운로드</button>
              <a class="asset-primary-link" href="./dev-assets-layer.html">파츠 단계로 돌아가기</a>
            </div>
            <p class="asset-lab-status" id="cropStatus" role="status">기준 이미지를 선택하면 영역을 확인할 수 있어요.</p>
          </div>
        </section>

        <section class="asset-lab-panel asset-lab-output-panel">
          <div class="asset-lab-output-header">
            <h2>영역 미리보기</h2>
          </div>
          <div class="asset-composite-preview" id="cropPreview" aria-live="polite"></div>
        </section>
      </section>
    </main>
    <script type="module" src="./dist/devtools/assetCharacterNav.js"></script>
    <script type="module" src="./dist/devtools/assetCrop.js"></script>
  </body>
</html>
