<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostNest Asset Tools</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="asset-lab-shell">
      <header class="asset-lab-header">
        <div>
          <p class="eyebrow">GhostNest 개발 도구</p>
          <h1>Asset Tools</h1>
        </div>
        <a class="asset-lab-back" href="./index.html">런타임으로 돌아가기</a>
      </header>

      <nav class="asset-tool-nav" aria-label="Asset tool pages">
        <a href="./dev-assets-crop.html">Crop 도구</a>
        <a href="./dev-assets-comfy.html">Comfy 생성</a>
        <a href="./dev-assets-layer.html">레이어 설정</a>
      </nav>

      <section class="asset-lab-grid" aria-label="Asset tool links">
        <article class="asset-lab-panel asset-tool-card">
          <h2>Crop 도구</h2>
          <p>기준 이미지를 확인하고 파츠 영역을 선택한 뒤, 수동 편집용 crop 이미지를 내려받아요.</p>
          <a href="./dev-assets-crop.html">Crop 도구 열기</a>
        </article>
        <article class="asset-lab-panel asset-tool-card">
          <h2>Comfy 생성</h2>
          <p>선택 영역과 프롬프트를 ComfyUI bridge로 보내 생성 결과를 받아요.</p>
          <a href="./dev-assets-comfy.html">Comfy 생성 열기</a>
        </article>
        <article class="asset-lab-panel asset-tool-card">
          <h2>레이어 설정</h2>
          <p>생성된 파츠를 surface layer 설정으로 만들고 프로젝트에 설정 파일로 저장해요.</p>
          <a href="./dev-assets-layer.html">레이어 설정 열기</a>
        </article>
      </section>
    </main>
  </body>
</html>
