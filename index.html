<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostNest Character Runtime MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="runtime-panel" aria-label="AI character runtime demo">
        <div class="scene-header observe-area" data-observe-area="runtimeTitle" tabindex="0">
          <p class="eyebrow">GhostNest Runtime</p>
          <h1>웹 캐릭터 런타임 MVP</h1>
        </div>

        <div class="event-log observe-area" data-observe-area="eventLog" tabindex="0" aria-live="polite">
          <h2>이벤트 로그</h2>
          <ol id="eventLog"></ol>
        </div>

        <aside class="runtime-status" aria-label="런타임 상태">
          <h2>런타임 상태</h2>
          <dl>
            <div>
              <dt>상태</dt>
              <dd id="statusMode">-</dd>
            </div>
            <div>
              <dt>표정</dt>
              <dd id="statusExpression">-</dd>
            </div>
            <div>
              <dt>표시</dt>
              <dd id="statusVisibility">-</dd>
            </div>
            <div>
              <dt>최근 이벤트</dt>
              <dd id="statusLastEvent">-</dd>
            </div>
            <div>
              <dt>Idle까지</dt>
              <dd id="statusIdleCountdown">-</dd>
            </div>
            <div>
              <dt>랜덤 발화</dt>
              <dd id="statusRandomPrompt">-</dd>
            </div>
            <div>
              <dt>예약 타이머</dt>
              <dd id="statusActionTimers">-</dd>
            </div>
          </dl>
        </aside>

        <div class="character-stage" id="characterStage">
          <div class="speech-balloon" id="speechBalloon" role="status" aria-live="polite">
            <span id="speakerName"></span>
            <p id="speechText"></p>
            <div class="balloon-action-menu" id="balloonActionMenu" hidden></div>
          </div>

          <button class="character-sprite" id="characterSprite" type="button" aria-label="캐릭터와 대화하기">
            <img class="character-sprite-image" id="characterSpriteImage" src="" alt="" />
          </button>

          <nav class="character-menu" aria-label="캐릭터 명령">
            <button type="button" data-command="fortune">오늘 운세</button>
            <button type="button" data-command="line">한마디</button>
            <button type="button" data-command="hide">숨기기</button>
          </nav>
        </div>
      </section>
    </main>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
