<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostNest Character Runtime MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="runtime-panel" aria-label="AI character runtime demo">
        <div class="scene-header observe-area" data-observe-area="runtimeTitle" tabindex="0">
          <p class="eyebrow">GhostNest Runtime</p>
          <h1>웹 캐릭터 런타임 MVP</h1>
        </div>

        <div class="event-log observe-area" data-observe-area="eventLog" tabindex="0" aria-live="polite">
          <h2>이벤트 로그</h2>
          <ol id="eventLog"></ol>
        </div>

        <aside class="runtime-status" aria-label="런타임 상태">
          <h2>런타임 상태</h2>
          <dl>
            <div>
              <dt>상태</dt>
              <dd id="statusMode">-</dd>
            </div>
            <div>
              <dt>표정</dt>
              <dd id="statusExpression">-</dd>
            </div>
            <div>
              <dt>표시</dt>
              <dd id="statusVisibility">-</dd>
            </div>
            <div>
              <dt>최근 이벤트</dt>
              <dd id="statusLastEvent">-</dd>
            </div>
            <div>
              <dt>Idle까지</dt>
              <dd id="statusIdleCountdown">-</dd>
            </div>
            <div>
              <dt>랜덤 발화</dt>
              <dd id="statusRandomPrompt">-</dd>
            </div>
            <div>
              <dt>예약 타이머</dt>
              <dd id="statusActionTimers">-</dd>
            </div>
            <div>
              <dt>실행 영역</dt>
              <dd id="statusRuntimeArea">-</dd>
            </div>
            <div>
              <dt>대사창</dt>
              <dd id="statusSpeechBox">-</dd>
            </div>
          </dl>
        </aside>

        <div class="character-stage" id="characterStage">
          <div class="speech-balloon" id="speechBalloon" role="status" aria-live="polite">
            <span id="speakerName"></span>
            <p id="speechText"></p>
            <div class="balloon-action-menu" id="balloonActionMenu" hidden></div>
          </div>

          <button class="character-sprite" id="characterSprite" type="button" aria-label="캐릭터와 대화하기">
            <img class="character-sprite-image" id="characterSpriteImage" src="" alt="" />
          </button>

        </div>

        <div class="management-panel-menu" id="panelActionMenu" hidden></div>
      </section>
    </main>

    <div id="hitboxEditor" class="hitbox-editor" data-runtime-ui="hitbox_editor" hidden>
      <div class="hitbox-editor-header">
        <h3>히트박스 에디터</h3>
        <div style="display: flex; gap: 8px;">
          <button type="button" id="hitboxEditorAdd" aria-label="새 부위 추가" style="font-size: 0.85rem;">+ 추가</button>
          <button type="button" id="hitboxEditorClose" aria-label="닫기">✕</button>
        </div>
      </div>
      <div class="hitbox-editor-body" id="hitboxEditorBody">
        <!-- JS에서 부위별 컨트롤 동적 생성 -->
      </div>
      <div class="hitbox-editor-footer">
        <button type="button" id="hitboxEditorCopy">설정값 JSON 복사</button>
      </div>
    </div>

    <button id="restoreBadge" class="restore-badge" aria-label="캐릭터 부르기" hidden>
      <span class="badge-icon">🐣</span>
    </button>
    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
